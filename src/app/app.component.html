<app-navbar (changeLanguageEvent)="changeLanguage($event)"></app-navbar>
<section class="w-100 h-100">
    <div style="text-align: center;" class="header jumbotron">
        <span class="font-weight-lighter text-dark" style="font-size: 37px;">{{textHello}}</span><br>
        <span class="font-weight-lighter text-dark" style="font-size: 30px;" [innerHTML]="textIam"></span>
        <span class="text-dark" style="font-size: 30px;" #hobbies id="hobbies"></span><br>
        <span class="font-weight-lighter text-dark" style="font-size: 25px;" [innerHTML]="textInterests"></span><br>
    </div>
    <div id="checkout" class="text-center">
        <a href="#projects"><span class="font-weight-lighter text-dark" style="font-size: 30px;" [innerHTML]="textCheckout"></span><br></a>
    </div>
</section>
<section id="projects" class="w-100 mb-5 pr-5 pl-5">
    <div *ngFor="let project of projects">
        <app-project [project]="project"></app-project>
    </div>
</section>
